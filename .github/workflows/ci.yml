name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check server syntax
        run: node --check server.js

      - name: Check frontend syntax
        run: node --check public/app.js

      - name: Check Ubuntu installer syntax
        run: bash -n install-ubuntu.sh

      - name: Check Windows installer syntax
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile((Join-Path $PWD 'install-windows.ps1'), [ref]$tokens, [ref]$errors) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.ToString() }
            exit 1
          }

      - name: Validate Docker Compose
        run: docker compose -f docker-compose.yml config

      - name: Build Docker image
        run: docker build -t xmaoclock-server:ci .
